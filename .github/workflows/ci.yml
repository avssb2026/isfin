name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      isfin_db_DATABASE_URL: ${{ secrets.ISFIN_DB_DATABASE_URL || secrets.ISFIN_DB_PRISMA_DATABASE_URL || 'postgresql://ci:ci@unused.invalid:5432/ci?schema=public' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npx prisma generate && next build
        env:
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
